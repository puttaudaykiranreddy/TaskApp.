<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskApp | Dashboard</title>
    <link rel="stylesheet" href="/static/landing.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .app-layout {
            display: flex;
            min-height: 100vh;
            background-color: #0f172a;
        }

        /* Sidebar styling */
        .sidebar {
            width: 250px;
            background: rgba(15, 23, 42, 0.8);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(90deg, #c084fc, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-align: center;
        }

        .sidebar-user {
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 30px;
            font-weight: 500;
            text-transform: capitalize;
        }

        .sidebar a {
            color: #94a3b8;
            text-decoration: none;
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 12px;
            font-weight: 500;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sidebar a:hover, .sidebar a.active {
            background: rgba(124, 58, 237, 0.1);
            color: #c084fc;
        }

        .sidebar .logout {
            margin-top: auto;
            color: #ef4444;
        }
        .sidebar .logout:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
        }

        /* Main Content styling */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header-area h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 36px;
            margin: 0;
            color: white;
        }
        .role-badge {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(56, 189, 248, 0.2);
            text-transform: capitalize;
        }

        /* Cards */
        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .stat-card h3 {
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .stat-card p {
            font-family: 'Outfit', sans-serif;
            font-size: 48px;
            font-weight: 700;
            margin: 0;
        }

        .c-total p { color: #38bdf8; }
        .c-completed p { color: #22c55e; }
        .c-pending p { color: #f59e0b; }
        .c-overdue p { color: #ef4444; }

    </style>
</head>
<body class="landing-body">
    <!-- Animated Background -->
    <div class="bg-blobs">
        <div class="blob1"></div>
        <div class="blob2"></div>
    </div>

    <div class="app-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <h2>TaskApp.</h2>
            <div id="sidebarUser" class="sidebar-user"></div>
            <a href="/dashboard-page" class="active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a href="/projects-page"><i class="fa-solid fa-folder"></i> Projects</a>
            <a href="/tasks-page"><i class="fa-solid fa-list-check"></i> Tasks</a>
            <a href="#" class="logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header-area">
                <h1>Overview</h1>
                <span class="role-badge" id="userRoleBadge">Role</span>
            </div>

            <div class="dashboard-cards">
                <div class="stat-card c-total">
                    <h3>Total Tasks</h3>
                    <p id="total">0</p>
                </div>
                <div class="stat-card c-completed">
                    <h3>Completed</h3>
                    <p id="completed">0</p>
                </div>
                <div class="stat-card c-pending">
                    <h3>Pending</h3>
                    <p id="pending">0</p>
                </div>
                <div class="stat-card c-overdue">
                    <h3>Overdue</h3>
                    <p id="overdue">0</p>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const role = localStorage.getItem("role") || "Member";
            document.getElementById("userRoleBadge").innerText = role;
        });
    </script>
</body>
</html>
